version: "3.8"
services:
  backend-flask:
    environment:
      # Ona
      # FRONTEND_URL: "https://3000--019cb315-0c56-751a-9a8d-541b1d1d7a39.eu-central-1-01.gitpod.dev/"
      # BACKEND_URL: "https://4567--019cb315-0c56-751a-9a8d-541b1d1d7a39.eu-central-1-01.gitpod.dev/"
      # Local
      FRONTEND_URL: "http://localhost:3000"
      BACKEND_URL: "http://localhost:4567"
    build: ./backend-flask
    ports:
      - "4567:4567"
    volumes:
      - ./backend-flask:/backend-flask
  frontend-react-js:
    environment:
      # Ona
      # REACT_APP_BACKEND_URL: "https://4567--019cb315-0c56-751a-9a8d-541b1d1d7a39.eu-central-1-01.gitpod.dev/"
      # Local
      REACT_APP_BACKEND_URL: "http://localhost:4567"
    build: ./frontend-react-js
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-react-js:/frontend-react-js

# the name flag is a hack to change the default prepend folder
# name when outputting the image names
networks: 
  internal-network:
    driver: bridge
    name: cruddur